<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Кино Ман</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Montserrat',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at top,#272750,#090912 70%);
    color:#fff;
}

.container{
    width:90%;
    max-width:380px;
    text-align:center;
    padding:35px 25px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    border-radius:30px;
    backdrop-filter:blur(15px);
    box-shadow:0 20px 50px rgba(0,0,0,.5);
}

.avatar{
    width:150px;
    height:150px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #ff4b6e;
    box-shadow:0 0 30px rgba(255,75,110,.6);
}

h1{
    margin-top:20px;
    font-size:32px;
    font-weight:700;
}

.subtitle{
    margin-top:10px;
    color:#c9c9d8;
    line-height:1.6;
}

.links{
    margin-top:35px;
}

.btn{
    display:block;
    text-decoration:none;
    color:white;
    background:linear-gradient(135deg,#ff4b6e,#7c4dff);
    padding:17px;
    border-radius:16px;
    margin-bottom:18px;
    font-weight:600;
    transition:.3s;
    box-shadow:0 10px 25px rgba(124,77,255,.35);
}

.btn:hover{
    transform:translateY(-4px);
    box-shadow:0 15px 35px rgba(255,75,110,.5);
}

.footer{
    margin-top:25px;
    color:#777;
    font-size:13px;
}
</style>

</head>
<body>

<div class="container">

<img src="avatar.jpg" class="avatar" alt="Кино Ман">

<h1>🎬 Кино Ман</h1>

<p class="subtitle">
Обзоры фильмов, сериалов и лучшие рекомендации для настоящих киноманов.
</p>

<div class="links">

<a class="btn"
href="https://t.me/kinoman332"
target="_blank">
📢 Мой Telegram-канал
</a>

</div>

<div class="footer">
Спасибо, что заглянул ❤️
</div>

</div>

</body>
</html>
